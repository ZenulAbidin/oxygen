swagger: '2.0'
info: { version: '', title: '' }
parameters:
  PaymentId:
    in: path
    name: paymentId
    type: string
    required: true
    description: Payment UUID

definitions:
  Payment:
    type: object
    required: [ id, currency, price, merchantName, isLocked ]
    properties:
      id:
        type: string
        description: Payment UUID
        example: 'a51e7a5-f0c8-48dc-a9fb-a335481ae846'
        x-nullable: false
      currency:
        type: string
        description: Currency
        example: 'USD'
        x-nullable: false
      price:
        type: number
        description: Price
        example: 39.90
        x-nullable: false
      isLocked:
        type: boolean
        description: Indicates is payment method can be changed
        example: true
        x-nullable: false
      merchantName:
        type: string
        description: Merchant's store name
        example: Delta Airlines
        x-nullable: false
      description:
        type: string
        description: Payment description
        example: M-sized sweater
        x-nullable: true
        x-omitempty: false
      customer:
        x-omitempty: false
        $ref: '#/definitions/Customer'
      paymentMethod:
        x-omitempty: false
        $ref: '#/definitions/PaymentMethod'
      paymentInfo:
        x-omitempty: false
        $ref: '#/definitions/PaymentInfo'

  SupportedPaymentMethods:
    type: object
    properties:
      availableMethods:
        type: array
        items:
          $ref: '#/definitions/SupportedPaymentMethod'

  PaymentMethod:
    type: object
    description: PaymentType
    x-omitempty: false
    properties:
      blockchain:
        type: string
        x-omitempty: false
      blockchainName:
        type: string
        x-omitempty: false
      isTest:
        type: boolean
        x-omitempty: false
      networkId:
        type: string
        x-omitempty: false
      currencyType:
        type: string
        description: Currency type, either native coin or token
        example: token
        enum: [ coin, token ]
        x-omitempty: false
      tokenContractAddress:
        type: string
        description: Token contract address for token payment methods
        example: 0xdac17f958d2ee523a2206206994597c13d831ec7
        x-omitempty: false
      displayName:
        type: string
        x-omitempty: false
      ticker:
        type: string
        x-omitempty: false
      name:
        type: string
        x-omitempty: false

  SupportedPaymentMethod:
    type: object
    description: PaymentType
    x-omitempty: false
    properties:
      blockchain:
        type: string
        x-omitempty: false
      blockchainName:
        type: string
        x-omitempty: false
      isTest:
        type: boolean
        x-omitempty: false
      networkId:
        type: string
        x-omitempty: false
      currencyType:
        type: string
        description: Currency type, either native coin or token
        example: token
        enum: [ coin, token ]
        x-omitempty: false
      tokenContractAddress:
        type: string
        description: Token contract address for token payment methods
        example: 0xdac17f958d2ee523a2206206994597c13d831ec7
        x-omitempty: false
      displayName:
        type: string
        x-omitempty: false
      ticker:
        type: string
        x-omitempty: false
      name:
        type: string
        x-omitempty: false

  Customer:
    type: object
    required: [ id, email ]
    x-omitempty: false
    properties:
      id:
        description: UUID
        type: string
        example: 'a51e7a5-f0c8-48dc-a9fb-a335481ae846'
        x-nullable: false
      email:
        description: Email
        type: string
        example: me@you.com
        x-nullable: false

  PaymentInfo:
    type: object
    x-omitempty: false
    description: Payment info
    required:
      - recipientAddress
      - amount
      - amountFormatted
      - status
      - expiresAt
      - expirationDurationMin
      - paymentLink
    properties:
      recipientAddress:
        type: string
        example: 0xbca4a8417e823484b21d2f4f1f1324d951236a49
        x-nullable: false
      amount:
        type: string
        description: Amount to pay in selected currency. Wei for ETH, Satoshi for BTC and so on...
        example: '1000000'
        x-nullable: false
      amountFormatted:
        type: string
        description: Human readable amount to pay.
        example: '0.123'
        x-nullable: false
      status:
        type: string
        description: Payment status
        example: success
        enum: [ pending, inProgress, success ]
        x-nullable: false
      paymentLink:
        type: string
        description: Payment link for QR code
        example: 'tron:TVEaDaTKJZ2RsQUWREWykouuHak9scyZaf'
        x-nullable: false
      expirationDurationMin:
        type: integer
        description: Expiration duration in minutes
        example: 20
        x-nullable: false
      expiresAt:
        type: string
        format: datetime
        description: payment expiration timestamp (UTC)
        example: '2023-03-09T20:18:07.809Z'
        x-nullable: false
      successAction:
        type: string
        description: Success action. Present if payment is successful
        enum: [ redirect, showMessage ]
        x-nullable: true
        x-omitempty: true
      successUrl:
        type: string
        description: |
          Success URL to where a user should be redirected after payment confirmation.
          Empty if success action is `showMessage`
        example: https://site.com/success
        x-nullable: true
        x-omitempty: true
      successMessage:
        type: string
        description: |
          Success message visible after payment confirmation (if successAction == `showMessage`)
        example: |
          Thanks you for purchasing our product! You will receive invitation on your email
        x-nullable: true
        x-omitempty: true
      observedTransaction:
        $ref: '#/definitions/ObservedPaymentTransaction'

  ObservedPaymentTransaction:
    type: object
    description: Transaction currently observed on-chain or in mempool without mutating payment state
    required:
      - transactionHash
      - amount
      - amountFormatted
      - confirmations
      - requiredConfirmations
      - isConfirmed
      - isMempool
    properties:
      transactionHash:
        type: string
        description: Blockchain transaction hash
        example: '73dfbf0b657e0a76d439c5cc9a92038c77adbef950a5ae634cc44a958a4b65c3'
        x-nullable: false
      senderAddress:
        type: string
        description: Sender address when available from the explorer/RPC response
        example: 'bc1q9pnvzdakvsag0g92kqw4m4ukvpv753ssed6ue5'
      amount:
        type: string
        description: Observed incoming amount in raw units
        example: '3076'
        x-nullable: false
      amountFormatted:
        type: string
        description: Human readable observed amount
        example: '0.00003076'
        x-nullable: false
      confirmations:
        type: integer
        description: Current confirmation count
        example: 0
        x-nullable: false
      requiredConfirmations:
        type: integer
        description: Confirmations required before payment state is updated
        example: 6
        x-nullable: false
      isConfirmed:
        type: boolean
        description: Whether this transaction has reached required confirmations
        example: false
        x-nullable: false
      isMempool:
        type: boolean
        description: Whether this transaction is known only from the mempool
        example: true
        x-nullable: false
      explorerLink:
        type: string
        description: Blockchain explorer link
        example: 'https://blockstream.info/tx/73dfbf0b657e0a76d439c5cc9a92038c77adbef950a5ae634cc44a958a4b65c3'

  CreateCustomerRequest:
    type: object
    required: [ email ]
    properties:
      email:
        description: Email
        type: string
        example: me@you.com
        x-nullable: false

  CreatePaymentMethodRequest:
    type: object
    required: [ ticker ]
    properties:
      ticker:
        description: Currency ticker
        type: string
        example: ETH_USDT
        x-nullable: false

paths:
  /payment/{paymentId}:
    get:
      summary: Get payment
      operationId: getPayment
      tags: [ Payment ]
      parameters:
        - $ref: '#/parameters/PaymentId'
      responses:
        200:
          description: Payment
          schema:
            $ref: '#/definitions/Payment'
        400:
          description: Bad request
          schema:
            $ref: '../payment-v1.yml#/definitions/ErrorResponse'
    put:
      summary: Lock payment options
      operationId: lockPaymentOptions
      tags: [ Payment ]
      parameters:
        - $ref: '#/parameters/PaymentId'
      responses:
        204:
          description: OK, payment selection locked
        400:
          description: Bad request
          schema:
            $ref: '../payment-v1.yml#/definitions/ErrorResponse'

  /payment/{paymentId}/method:
    post:
      summary: Select payment method
      operationId: createPaymentMethod
      tags: [ Payment ]
      parameters:
        - $ref: '#/parameters/PaymentId'
        - in: body
          name: data
          required: true
          schema:
            $ref: '#/definitions/CreatePaymentMethodRequest'
      responses:
        201:
          description: Payment method selected
          schema:
            $ref: '#/definitions/PaymentMethod'
        400:
          description: Bad request
          schema:
            $ref: '../payment-v1.yml#/definitions/ErrorResponse'

  /payment/{paymentId}/supported-method:
    get:
      summary: Get available payment methods
      operationId: getPaymentMethods
      tags: [ Payment ]
      parameters:
        - $ref: '#/parameters/PaymentId'
      responses:
        200:
          description: Payment types
          schema:
            $ref: '#/definitions/SupportedPaymentMethods'

  /payment/{paymentId}/customer:
    post:
      summary: Create customer
      description: Upserts customer
      operationId: createPaymentCustomer
      tags: [ Payment ]
      parameters:
        - $ref: '#/parameters/PaymentId'
        - in: body
          name: data
          required: true
          description: Customer request
          schema:
            $ref: '#/definitions/CreateCustomerRequest'
      responses:
        201:
          description: Customer created
          schema:
            $ref: '#/definitions/Customer'
        400:
          description: Bad request
          schema:
            $ref: '../payment-v1.yml#/definitions/ErrorResponse'
